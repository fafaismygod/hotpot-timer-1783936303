<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <title>火锅计时</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff3b30">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="火锅计时">
  <link rel="apple-touch-icon" href="icon.svg">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">

    <section id="libraryView" class="view view-active">
      <div id="ingredientGrid" class="grid"></div>
    </section>

    <section id="moreView" class="view">
      <div class="more-group">
        <div class="more-row">
          <span class="more-label">到点铃声</span>
          <button class="ios-switch" id="swBell" role="switch" aria-checked="true" aria-label="到点铃声"></button>
        </div>
        <div class="more-row">
          <span class="more-label">结束铃声次数</span>
          <div class="segmented" id="segDing">
            <button class="seg-item" data-ding="1">1 下</button>
            <button class="seg-item" data-ding="3">3 下</button>
          </div>
        </div>
        <div class="more-row">
          <span class="more-label">准备倒计时</span>
          <div class="segmented" id="segPrep">
            <button class="seg-item" data-prep="1">1 秒</button>
            <button class="seg-item" data-prep="2">2 秒</button>
            <button class="seg-item" data-prep="3">3 秒</button>
          </div>
        </div>
        <div class="more-row">
          <span class="more-label">到点边框脉冲</span>
          <button class="ios-switch" id="swPulse" role="switch" aria-checked="true" aria-label="到点边框脉冲"></button>
        </div>
        <div class="more-row">
          <span class="more-label">七上八下引导</span>
          <button class="ios-switch" id="swSevenUp" role="switch" aria-checked="true" aria-label="七上八下引导"></button>
        </div>
      </div>

      <div class="more-group">
        <div class="more-row">
          <span class="more-label">列数</span>
          <div class="segmented" id="segCols">
            <button class="seg-item" data-cols="2">2</button>
            <button class="seg-item" data-cols="3">3</button>
            <button class="seg-item" data-cols="4">4</button>
          </div>
        </div>
      </div>

      <div class="more-group">
        <div class="more-row more-row-btn" id="resetBtn">
          <span class="more-label">恢复默认设置</span>
          <span class="more-arrow">›</span>
        </div>
      </div>

      <div class="more-group">
        <div class="more-row more-row-btn" id="aboutBtn">
          <span class="more-label">关于</span>
          <span class="more-arrow">›</span>
        </div>
      </div>

      <p class="more-foot" id="aboutText" style="display:none">火锅计时 · 纯本地 PWA · 无需联网<br>长按食材卡片可拖拽排序，点右上角 ⋯ 设置食材</p>
    </section>

    <nav id="bottomNav" class="bottom-nav">
      <button class="nav-item active" data-view="libraryView">
        <span class="nav-icon">🥬</span>
        <span class="nav-text">食材库</span>
      </button>
      <button class="nav-item" data-view="moreView">
        <span class="nav-icon">⚙️</span>
        <span class="nav-text">更多</span>
      </button>
    </nav>

  </main>

  <!-- 添加自定义食材 -->
  <div id="customModal" class="modal-overlay" style="display:none">
    <div class="modal" role="dialog" aria-labelledby="customTitle">
      <div class="modal-header">
        <h3 id="customTitle">添加食材</h3>
        <button class="btn-close" id="customClose" aria-label="关闭">&times;</button>
      </div>
      <form id="customForm">
        <input type="hidden" id="customId">
        <div class="form-group">
          <label for="customName">食材名称 <span class="required">*</span></label>
          <input type="text" id="customName" required placeholder="例如：潮汕牛肉" maxlength="20">
        </div>
        <div class="form-group">
          <label>烫煮时间 <span class="required">*</span></label>
          <div class="time-split">
            <input type="number" id="customMinutes" required placeholder="分" min="0" max="60" inputmode="numeric" value="0">
            <span class="time-unit">分</span>
            <input type="number" id="customSecsInput" required placeholder="秒" min="0" max="59" inputmode="numeric" value="0">
            <span class="time-unit">秒</span>
          </div>
          <p class="form-hint">例如：3 分 0 秒</p>
        </div>
        <div class="form-group">
          <label class="form-row-label">
            <span>七上八下食材</span>
            <button type="button" class="ios-switch" id="swCustomSeven" role="switch" aria-checked="false" aria-label="七上八下"></button>
          </label>
          <p class="form-hint">勾选后运行时进入节拍引导模式</p>
        </div>
        <div class="form-actions">
          <button type="button" id="customCancel" class="btn btn-outline">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 食材设置弹窗 -->
  <div id="settingsModal" class="modal-overlay" style="display:none">
    <div class="modal" role="dialog" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <h3 id="settingsTitle">食材设置</h3>
        <button class="btn-close" id="settingsClose" aria-label="关闭">&times;</button>
      </div>
      <div id="settingsBody"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="food-icons.js"></script>
  <script src="app.js"></script>
</body>
</html>
